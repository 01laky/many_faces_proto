// health.proto - gRPC service for AI worker (many_faces_ai) and BeDemo.Api client.
// Canonical copy: many_faces_proto; generate C# from many_faces_backend, Python from many_faces_ai.

syntax = "proto3";

package health;

option csharp_namespace = "Health";

// Health service provides health check and AI generation functionality
service HealthService {
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
  rpc Generate (GenerateRequest) returns (GenerateResponse);
  rpc ReviewContent (ContentReviewRequest) returns (ContentReviewResponse);
  // Fetches JSON from an HTTP GET URL (intended for BeDemo public stats). Implemented in the Python worker.
  rpc FetchPublicStats (FetchPublicStatsRequest) returns (FetchPublicStatsResponse);
  // Optional path: Python fetches live public snapshot then answers with the local model (operator chat).
  rpc OperatorStatsChat (OperatorStatsChatRequest) returns (GenerateResponse);
}

message HealthCheckRequest {}
message HealthCheckResponse {
  string status = 1;
  string message = 2;
}

message GenerateRequest {
  string prompt = 1;
  int32 max_new_tokens = 2;
  // When set, the Python server prepends this JSON as read-only context before the user prompt (admin AI chat).
  optional string stats_context_json = 3;
  // Admin operator UI locale for the reply: en | sk | cz
  optional string response_locale = 4;
}

message GenerateResponse {
  string text = 1;
  string error = 2;
}

message FetchPublicStatsRequest {
  // Full URL to GET (e.g. http://be-demo-api:7199/api/Stats/public).
  string absolute_url = 1;
}

message FetchPublicStatsResponse {
  string json_body = 1;
  string error = 2;
}

message OperatorStatsChatRequest {
  string user_message = 1;
  string history_text = 2;
  bool fetch_live_public_snapshot = 3;
  string public_stats_absolute_url = 4;
  int32 max_new_tokens = 5;
}

message ContentReviewRequest {
  string content_type = 1;
  int32 content_id = 2;
  int32 moderation_version = 3;
  int32 face_id = 4;
  string title = 5;
  string body = 6;
  string media_url = 7;
  string creator_id = 8;
}

message ContentReviewResponse {
  string decision = 1;
  double confidence = 2;
  string risk_level = 3;
  repeated string flags = 4;
  string reason = 5;
  string user_message = 6;
  string model_version = 7;
  string trace_id = 8;
  string error = 9;
}
